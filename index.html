    <!--
      Static structured data, in the raw HTML rather than injected by React/Helmet.
      This guarantees Google sees an explicit site name no matter what — it
      doesn't depend on JS executing or the name-gate state, unlike anything
      rendered client-side.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "K1 Weekly Wonders",
        "alternateName": "K1 Weekly",
        "url": "https://k1weekly.netlify.app/",
        "description": "Free interactive numeracy games for Kindergarten 1 students.",
        "inLanguage": "en"
      }
    </script>
  </head>
